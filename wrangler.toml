# Cloudflare Pages Configuration
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "toonflow-vendors"
compatibility_date = "2024-01-01"

# Pages 项目配置
[site]
bucket = "."

# 构建配置（纯静态站点不需要构建命令）
[build]
command = ""

# 环境变量（可选）
[vars]
ENVIRONMENT = "production"

# 路由规则
[[routes]]
pattern = "/*"
custom_domain = false
